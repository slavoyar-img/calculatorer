<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>20x10 Grid</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: white;
      font-family: Arial, sans-serif;
    }

    /* Input row */
    .top-row {
      display: flex;
      width: 100%;
      gap: 10px;
      margin-bottom: 20px;
    }

    .top-input,
    .bottom-display {
      width: 100%;
      height: 50px;
      font-size: 18px;
      padding: 10px;
      border: 2px solid black;
    }

    .top-input {
      flex: 1;
    }

    .bottom-display {
      background: #f2f2f2;
      margin-bottom: 20px;
    }

    /* Blue square arrow button */
    .submit-btn {
      width: 50px;
      height: 50px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 24px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #005fd1;
    }

    /* Grid */
    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 4px;
    }

    .grid button {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid black;
      background: #e0e0e0;
      cursor: pointer;
      font-size: 12px;
    }

    .grid button:hover {
      background: #d0d0d0;
    }
  </style>
</head>

<body>

  <!-- Input + button -->
  <div class="top-row">
    <input
      type="text"
      class="top-input"
      id="mathInput"
      placeholder="1+1"
    />

    <button class="submit-btn" id="submitBtn">
      →
    </button>
  </div>

  <!-- Output -->
  <input
    type="text"
    class="bottom-display"
    id="resultDisplay"
    readonly
  />

  <!-- Grid -->
  <div class="grid" id="grid"></div>

  <!-- Scripts -->
  <script src="code.js"></script>
  <script src="grid.js"></script>

</body>
</html>
